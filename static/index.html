<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代理池 Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .badge-s { background: rgba(255, 215, 0, 0.15); color: #ffd700; border: 1px solid rgba(255, 215, 0, 0.3); }
  .lat-s { color: #ffd700; font-weight: 700; }
  .stat-card.verified .stat-icon { background: rgba(163, 113, 247, 0.15); color: var(--purple); }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo"><i class="ri-server-line"></i><span>ProxyPool</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-tab="all"><i class="ri-list-check"></i><span>全部代理</span></a>
      <a href="#" class="nav-item" data-tab="china"><i class="ri-flag-2-line"></i><span>中国代理</span></a>
      <a href="#" class="nav-item" data-tab="foreign"><i class="ri-earth-line"></i><span>国外代理</span></a>
      <a href="#" class="nav-item" data-tab="s"><i class="ri-vip-crown-fill"></i><span>S 级代理</span></a>
      <div class="nav-divider"></div>
      <div class="nav-section-title">代理服务</div>
      <div class="service-controls">
        <div class="service-item">
          <span class="service-label">HTTP</span>
          <button id="btn-http" class="btn-service" data-service="http">启动</button>
          <span class="service-status" id="status-http">:8080</span>
        </div>
        <div class="service-item">
          <span class="service-label">SOCKS5</span>
          <button id="btn-socks5" class="btn-service" data-service="socks5">启动</button>
          <span class="service-status" id="status-socks5">:1080</span>
        </div>
      </div>
      <div class="nav-divider"></div>
      <div class="nav-section-title">节点选择</div>
      <div class="node-selector">
        <div id="selected-node" class="selected-node none">🔄 自动轮换</div>
        <select id="node-picker" class="node-picker"><option value="">-- 选择节点 --</option></select>
        <button class="btn btn-sm" id="btn-clear-node" disabled>清除</button>
      </div>
      <div class="nav-divider"></div>
      <div class="nav-section-title">路由策略</div>
      <div class="strategy-selector">
        <select id="strategy-picker" class="node-picker">
          <option value="balanced">⚖️ 均衡加权</option>
          <option value="latency">⚡ 延迟优先</option>
          <option value="sticky">📌 成功粘性</option>
        </select>
      </div>
      <div class="nav-divider"></div>
      <a href="#" class="nav-item" data-tab="nodes"><i class="ri-cloud-line"></i><span>远程节点</span></a>
      <a href="#" class="nav-item" data-tab="regions"><i class="ri-pie-chart-2-line"></i><span>地区分布</span></a>
    </nav>
    <div class="sidebar-footer"><div class="version">v2.0</div></div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-title">
        <h1>代理池仪表盘</h1>
        <p class="subtitle">高质量免费代理 · HTTP + SOCKS5 · 随机轮换</p>
      </div>
      <div class="topbar-actions">
        <button id="refresh-btn" class="btn btn-primary"><i class="ri-refresh-line"></i><span>立即检测</span></button>
      </div>
    </header>

    <!-- 统计卡 -->
    <section class="stats-section">
      <div class="stat-card total"><div class="stat-icon"><i class="ri-database-2-line"></i></div>
        <div class="stat-content"><span class="stat-value" id="s-total">0</span><span class="stat-label">Raw Pool</span></div></div>
      <div class="stat-card verified"><div class="stat-icon"><i class="ri-shield-check-line"></i></div>
        <div class="stat-content"><span class="stat-value" id="s-verified">0</span><span class="stat-label">Verified</span></div></div>
      <div class="stat-card s-tier"><div class="stat-icon"><i class="ri-vip-crown-fill"></i></div>
        <div class="stat-content"><span class="stat-value" id="s-S">0</span><span class="stat-label">S 级 &lt;200ms</span></div></div>
      <div class="stat-card a-tier"><div class="stat-icon"><i class="ri-flashlight-fill"></i></div>
        <div class="stat-content"><span class="stat-value" id="s-A">0</span><span class="stat-label">A 级 &lt;500ms</span></div></div>
      <div class="stat-card b-tier"><div class="stat-icon"><i class="ri-speed-line"></i></div>
        <div class="stat-content"><span class="stat-value" id="s-B">0</span><span class="stat-label">B 级 &lt;1000ms</span></div></div>
      <div class="stat-card c-tier"><div class="stat-icon"><i class="ri-hourglass-line"></i></div>
        <div class="stat-content"><span class="stat-value" id="s-C">0</span><span class="stat-label">C 级</span></div></div>
    </section>

    <!-- 检测进度 -->
    <section class="progress-section hidden" id="progress-section">
      <div class="progress-info">
        <span class="progress-label" id="status-text">就绪</span>
        <span class="progress-sub" id="status-sub">-</span>
        <span class="progress-text" id="progress-text">0/0</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </section>

    <!-- 筛选 + 导出 -->
    <section class="filter-section">
      <div class="filters">
        <div class="filter-item"><label><i class="ri-map-pin-line"></i></label><select id="region-filter"><option value="">所有地区</option></select></div>
        <div class="filter-item"><label><i class="ri-shield-keyhole-line"></i></label><select id="protocol-filter"><option value="">所有协议</option><option value="http">HTTP</option><option value="https">HTTPS</option></select></div>
        <div class="filter-item"><label><i class="ri-speed-line"></i></label><select id="speed-filter"><option value="">所有质量</option><option value="S">S 级</option><option value="A">A 级</option><option value="B">B 级</option><option value="C">C 级</option></select></div>
        <div class="filter-item search"><i class="ri-search-line"></i><input type="text" id="search-input" placeholder="搜索 IP..."></div>
      </div>
      <div class="export-actions">
        <button class="btn btn-sm" id="exp-http"><i class="ri-global-line"></i> HTTP</button>
        <button class="btn btn-sm" id="exp-https"><i class="ri-lock-line"></i> HTTPS</button>
        <button class="btn btn-sm" id="exp-s"><i class="ri-vip-crown-fill"></i> S 级</button>
        <button class="btn btn-sm" id="exp-china"><i class="ri-flag-2-line"></i> 中国</button>
        <button class="btn btn-sm" id="exp-all"><i class="ri-download-line"></i> 全部</button>
      </div>
    </section>

    <!-- 表格 -->
    <section class="table-section">
      <div class="table-header">
        <span class="result-count"><span id="filtered-count">0</span> 条结果</span>
        <span class="avg-latency">均延迟: <strong id="avg-latency">--</strong>ms</span>
      </div>
      <div class="table-wrapper">
        <table><thead><tr>
          <th>IP 地址</th><th>端口</th><th>协议</th><th>地区</th><th>速度</th><th>延迟</th><th>来源</th><th>操作</th>
        </tr></thead><tbody id="proxy-list"></tbody></table>
      </div>
      <div id="loading" class="loading hidden"><div class="spinner"></div><p>加载中...</p></div>
      <div id="no-results" class="no-results hidden"><i class="ri-inbox-line"></i><p>无匹配结果</p></div>
    </section>

    <!-- 分页 -->
    <section class="pagination">
      <button class="btn-page" id="prev-page" disabled><i class="ri-arrow-left-s-line"></i></button>
      <span class="page-info"><span id="current-page">1</span> / <span id="total-pages">1</span></span>
      <button class="btn-page" id="next-page"><i class="ri-arrow-right-s-line"></i></button>
    </section>
  </main>
</div>
<div id="toast" class="toast hidden">已复制</div>
<script src="app.js"></script>
</body>
</html>
